enable-builtin-rules:
  - aws-access-key-id
  - aws-secret-access-key

disable-allow-rules:
  - usr-dirs

rules:
  - id: custom-api-key
    description: 'Hardcoded API key in source code'
    severity: HIGH
    regex: '(?i)(apiKey|api_key|token|secret)\s*=\s*"[A-Za-z0-9_/+\-]{8,}"'
    keywords:
      - apiKey
      - token
      - secret
